services:
  ubuntu:
    container_name: miad
    hostname: ${PRIMARY_HOSTNAME:-mail.example.com}
    build: .
    tty: true
    volumes:
      - ./data:/home/user-data:rw
      - /etc/nsd/zones:/etc/nsd/zones:rw
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /sys:/sys:ro
    cgroup: host
    restart: always
    privileged: true
    cap_add:
      - SYS_ADMIN
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.default.disable_ipv6=0
    ports:
      - 25:25
      - "530:53/tcp"
      - "538:53/udp"
      # HTTP/HTTPS uses non-standard host ports (810/4413) with SNIProxy
      # on the host to route standard 80/443 → 810/4413. This allows
      # Mail-in-a-Box to coexist with other web services on the same host.
      # See setup-sniproxy.sh for configuration.
      - 810:80
      - 4413:443
      - 465:465
      - 587:587
      - 993:993
      - 995:995
      - 4190:4190
      - 10025:10025
